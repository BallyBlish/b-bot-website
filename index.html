<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 網頁產生器</title>
    <style>
        /* 預設的等待畫面樣式 */
        body.loading-mode {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { color: #5865F2; }
    </style>
</head>
<body class="loading-mode">

    <div id="init-screen" class="card">
        <h1>🤖 AI 網頁產生器已就緒</h1>
        <p>請在 Discord 中輸入指令，Gemini 寫好的網站會直接在這裡顯現！</p>
    </div>

    <div id="ai-web-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNk1vE7vubqoYEtn3HGzeabolYq18619A",
            authDomain: "b-bot-website.firebaseapp.com",
            databaseURL: "https://b-bot-website-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "b-bot-website",
            storageBucket: "b-bot-website.appspot.com",
            messagingSenderId: "508997126688",
            appId: "1:508997126688:web:55fb45728235763e808a45"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messageRef = ref(db, 'botMessage');

        onValue(messageRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                
                // 如果偵測到 Firebase 裡面有 Gemini 寫好的網頁程式碼
                if (data.html_code) {
                    // 1. 拔掉原本的深色背景限制
                    document.body.className = ""; 
                    // 2. 隱藏初始畫面
                    document.getElementById('init-screen').style.display = 'none';
                    
                    // 3. 施展魔法：把 Gemini 的 HTML 塞進去，並強制執行裡面的 CSS 樣式
                    const container = document.getElementById('ai-web-container');
                    container.innerHTML = data.html_code;
                }
            }
        });
    </script>
</body>
</html>

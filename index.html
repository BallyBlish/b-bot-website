<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 盲盒遊戲機</title>
    <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #main-card { background: #1e293b; padding: 30px; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 90vw; }
        #game-container { background: #000; border: 4px solid #fff; min-width: 400px; min-height: 400px; position: relative; margin-top: 20px; color: #fff; font-family: 'Press Start 2P', monospace; }
        .status-msg { font-size: 1.2em; color: #38bdf8; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="main-card">
        <h1 style="color: #5865F2; margin: 0;">🎲 AI 經典盲盒遊戲機</h1>
        <div id="status" class="status-msg">請在 Discord 輸入 !遊戲 開始孵化...</div>
        
        <div id="game-container">
            <div style="padding: 100px 20px;">等待 AI 注入遊戲世界...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNk1vE7vubqoYEtn3HGzeabolYq18619A",
            authDomain: "b-bot-website.firebaseapp.com",
            databaseURL: "https://b-bot-website-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "b-bot-website",
            storageBucket: "b-bot-website.appspot.com",
            messagingSenderId: "508997126688",
            appId: "1:508997126688:web:55fb45728235763e808a45"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messageRef = ref(db, 'botMessage');

        let currentScript = null;

        onValue(messageRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                const statusDiv = document.getElementById('status');
                const container = document.getElementById('game-container');

                if (data.status === "thinking_ui") {
                    statusDiv.innerText = "🧠 階段 1：AI 正在瘋狂構思並打造遊戲的 UI 介面...";
                } 
                elif (data.status === "thinking_js") {
                    statusDiv.innerText = "⚡ 階段 2：介面完成！AI 正在灌注核心 JavaScript 遊戲靈魂...";
                    // 注入 HTML 身體
                    if (data.html_code) container.innerHTML = data.html_code;
                } 
                elif (data.status === "done") {
                    statusDiv.innerText = "✨ 盲盒孵化成功！請點擊畫面開始遊玩！";
                    
                    // 移除舊的 JS 大腦以免衝突
                    if (currentScript) currentScript.remove();

                    // 注入新的 JS 大腦
                    if (data.js_code) {
                        currentScript = document.createElement('script');
                        currentScript.text = data.js_code + "\nif(typeof initGame === 'function'){ initGame(); }";
                        document.body.appendChild(currentScript);
                    }
                }
            }
        });
    </script>
</body>
</html>
